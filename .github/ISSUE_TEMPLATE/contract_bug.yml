name: Contract bug
description: Report a reproducible bug in the Stargate Soroban contracts.
title: "[Bug][Contract]: "
labels: ["bug"]
body:
  - type: dropdown
    id: contract
    attributes:
      label: Affected contract
      options:
        - invoice
        - treasury
        - compliance
        - cross-contract flow
        - unknown
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the incorrect behavior and why it matters.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the exact test, command, transaction, or contract call sequence.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include panic messages, logs, failed assertions, or transaction output.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or release
      description: The commit SHA, branch, or release where you observed the issue.
      placeholder: main @ abc1234
  - type: textarea
    id: verification
    attributes:
      label: Verification commands
      description: List any commands you ran, such as cargo test or cargo clippy.
      placeholder: |
        cargo fmt --all -- --check
        cargo clippy -- -D warnings
        cargo test
