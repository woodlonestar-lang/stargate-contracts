name: Contract feature
description: Propose an improvement to the Stargate Soroban contracts.
title: "[Feature][Contract]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Contract area
      options:
        - invoice
        - treasury
        - compliance
        - ABI or generated artifacts
        - local developer experience
        - cross-contract flow
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, protocol, or maintainer need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the contract API, storage, event, test, or tooling change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the behavior, tests, docs, or generated artifacts required to consider this complete.
      placeholder: |
        - ...
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and migration notes
      description: Note any ABI, storage, deployment, or backwards-compatibility impact.
  - type: textarea
    id: verification
    attributes:
      label: Suggested verification
      description: List the commands or scenarios that should prove the change works.
      placeholder: |
        cargo fmt --all -- --check
        cargo clippy -- -D warnings
        cargo test
