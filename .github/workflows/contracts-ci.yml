name: Contracts CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the exact channel, targets, and components
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown
          components: rustfmt,clippy
      # Cache Rust toolchain and target/ directory to speed up builds
      - uses: Swatinem/rust-cache@v2
      # Verify code formatting: fail if cargo fmt would make changes
      - run: cargo fmt --all -- --check
      # Run clippy lints with all warnings treated as errors (-D warnings)
      - run: cargo clippy -- -D warnings
      - run: bash scripts/lint-docs.sh
      # Run all unit and integration tests
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      # Build WASM binaries for Soroban runtime
      - run: cargo build --target wasm32-unknown-unknown --release

  # Audit dependencies for known vulnerabilities and license/ban violations
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Fail when committed abis/*.json drift from contract sources without an explicit update.
  abi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Detect ABI metadata drift
        run: |
          set -euo pipefail
          scripts/generate_abi_metadata.sh /tmp/abis-regenerated
          if ! diff -ru abis/ /tmp/abis-regenerated/; then
            echo "::error::ABI metadata drift detected. Regenerate with: make update-abi-snapshots  (or: just snapshot)"
            exit 1
          fi
