repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false
      - id: abi-snapshot-hygiene
        name: ABI snapshot hygiene
        entry: scripts/check_abi_snapshot_hygiene.sh
        language: system
        pass_filenames: false
